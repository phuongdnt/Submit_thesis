# =============================================================================
# QUICK TEST CONFIGURATION - FOR VERIFICATION ONLY
# =============================================================================
# Use this to quickly verify the Pareto training pipeline works
# before running full experiments
#
# Usage:
#   python -m inventory_management_RL_Lot.train_pareto --config configs/pareto_test.yaml
# =============================================================================

env:
  env_type: serial
  level_num: 3
  lead_time: 2
  episode_len: 50  # Short episodes
  action_dim: 21   # Smaller action space
  init_inventory: 15
  init_outstanding: 5
  holding_cost: [1.0, 1.0, 1.0]
  backlog_cost: [5.0, 3.0, 2.0]
  fixed_cost: 1.0
  price_discount: false
  eval_data_dir: "test_data/test_demand_merton"
  
  cost_weight: 1.0
  service_weight: 0.0
  service_bonus_scale: 10.0

agent:
  hidden_dim: 64
  critic_hidden_dim: 128
  actor_lr: 0.001
  critic_lr: 0.001
  gamma: 0.99
  gae_lambda: 0.95
  eps_clip: 0.2
  value_coef: 0.5
  entropy_coef: 0.05

training:
  episodes: 200  # Very few episodes for testing
  evaluate_every: 50
  use_ga: true
  ga_horizon: 3
  n_rollout_threads: 4
  n_eval_rollout_threads: 1
  early_stop: false  # Disable early stopping for test
  n_warmup_evaluations: 2
  n_no_improvement_thres: 5
  save_best: true

heuristic:
  ga:
    pop_size: 10
    generations: 10
    mutation_rate: 0.15

pareto:
  weight_configs:
    - name: "cost_focused"
      cost_weight: 1.0
      service_weight: 0.0
    - name: "balanced"
      cost_weight: 0.5
      service_weight: 0.5
    - name: "service_focused"
      cost_weight: 0.0
      service_weight: 1.0
  
  seeds: [1]  # Single seed for quick test
  output_dir: "results/pareto_test"
